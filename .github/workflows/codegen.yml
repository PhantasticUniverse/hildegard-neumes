name: codegen

on:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-rhena-glyphs.py'
      - 'src/glyph-names.json'
      - 'src/widths.json'
      - 'tests/fixtures/make_minimal_ttf.py'
      - 'tests/fixtures/make_minimal_otf.py'
      - '.github/workflows/codegen.yml'
  pull_request:
    paths:
      - 'scripts/generate-rhena-glyphs.py'
      - 'src/glyph-names.json'
      - 'src/widths.json'
      - 'tests/fixtures/make_minimal_ttf.py'
      - 'tests/fixtures/make_minimal_otf.py'

# Exercises the codegen pipeline against BOTH the TTF (quadratic) and
# OTF/CFF (cubic) test fixtures. ADR-0007 pins production to OTF/CFF;
# the TTF fixture provides defense-in-depth coverage for the glyf
# codepath.

jobs:
  codegen-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fmt: [ttf, otf]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Build minimal test ${{ matrix.fmt }} fixture
        run: |
          mkdir -p tests/fixtures
          python tests/fixtures/make_minimal_${{ matrix.fmt }}.py \
            --widths src/widths.json \
            --out tests/fixtures/minimal.${{ matrix.fmt }}

      - name: Run codegen against ${{ matrix.fmt }} fixture
        env:
          SOURCE_DATE_EPOCH: '0'
        run: |
          mkdir -p generated
          python scripts/generate-rhena-glyphs.py \
            --in tests/fixtures/minimal.${{ matrix.fmt }} \
            --names-map src/glyph-names.json \
            --widths-table src/widths.json \
            --out generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs \
            --timestamp 2026-01-01T00:00:00Z

      - name: Assert ${{ matrix.fmt }} output is non-empty and well-formed
        run: |
          test -s generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs
          grep -q '@generated' generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs
          grep -q 'pub const PUNCTUM' generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs
          grep -q 'pub const ALL_GLYPHS' generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs

      - name: Format-specific command assertions
        run: |
          if [ "${{ matrix.fmt }}" = "otf" ]; then
            grep -q ' C ' generated/rhineland_glyphs_from_otf.rs || (echo "OTF output missing C commands" && exit 1)
          else
            grep -q ' Q ' generated/rhineland_glyphs_from_ttf.rs || (echo "TTF output missing Q commands" && exit 1)
          fi

      - name: Upload generated file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhineland-glyphs-rs-${{ matrix.fmt }}
          path: generated/rhineland_glyphs_from_${{ matrix.fmt }}.rs
          retention-days: 14
