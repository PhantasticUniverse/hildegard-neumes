name: smoke-rhena

# Opt-in integration gate: clone Rhena at a chosen ref, drop the generated
# rhineland_glyphs.rs into a throwaway copy of the checkout, and run
# `cargo check -p rhena-core`. This validates that the generated file
# preserves the Glyph struct contract and that Rhena's render_ir still
# compiles against it.
#
# Why workflow_dispatch only (no schedule):
# Per docs/planning/claude-review-2-2026-04-14.md § 3, the previous cron
# schedule ran daily against a `hildegard-project/hildegard` GitHub repo
# that does not yet exist, producing failing runs with no signal. The
# schedule is disabled until (a) the real OTF exists and the test is
# meaningful, and (b) a public Rhena repo exists to clone from. Until
# then this workflow is triggerable only via the Actions tab.
#
# Why the rhena_repo input is parametrized:
# Per docs/planning/claude-review-3-2026-04-14.md § 3, the default
# `hildegard-project/hildegard` repo is currently local-only, so a
# vanilla workflow_dispatch run will 404 on checkout. The rhena_repo
# input lets a runner point at any public fork (including
# feature/debug branches) without editing this file. When the Rhena
# project publishes its upstream repo, update the default.
#
# Why no `cargo test` step:
# The previous version ran `cargo test ... || true` to tolerate snapshot
# churn from the placeholder TTF fixture. The review correctly pointed
# out that `|| true` converts a failing test into a green CI signal,
# which is dishonest. Real snapshot verification requires the true OTF
# + human diff review against the Dendermonde manuscript reference; it
# cannot be automated at this stage. The step has been removed; keeping
# `cargo check` as the compile-level gate.
#
# continue-on-error: NOT set. This workflow is a hard gate: if a human
# triggers it, they want to know whether it passed. A failure means
# the generated file does not compile against the current Rhena tree,
# which is a real regression and should block until diagnosed.

on:
  workflow_dispatch:
    inputs:
      rhena_repo:
        description: 'Rhena GitHub repo slug (org/repo). Default is local-only; override to a public fork to make this workflow runnable.'
        required: true
        default: 'hildegard-project/hildegard'
      rhena_ref:
        description: 'Rhena git ref to test against (branch, tag, or SHA)'
        required: true
        default: 'main'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      RHENA_REPO: ${{ github.event.inputs.rhena_repo || 'hildegard-project/hildegard' }}
      RHENA_REF: ${{ github.event.inputs.rhena_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: hildegard-neumes

      - name: Clone Rhena
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RHENA_REPO }}
          ref: ${{ env.RHENA_REF }}
          path: hildegard

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e './hildegard-neumes[dev]'

      - name: Build minimal test TTF
        working-directory: hildegard-neumes
        run: |
          mkdir -p tests/fixtures
          python tests/fixtures/make_minimal_ttf.py \
            --widths src/widths.json \
            --out tests/fixtures/minimal.ttf

      - name: Run codegen
        working-directory: hildegard-neumes
        env:
          SOURCE_DATE_EPOCH: '0'
        run: |
          mkdir -p generated
          python scripts/generate-rhena-glyphs.py \
            --in tests/fixtures/minimal.ttf \
            --names-map src/glyph-names.json \
            --widths-table src/widths.json \
            --out generated/rhineland_glyphs.rs \
            --timestamp 2026-01-01T00:00:00Z

      - name: Drop generated file into Rhena
        run: |
          cp hildegard-neumes/generated/rhineland_glyphs.rs \
             hildegard/crates/rhena-core/src/render_ir/glyphs/rhineland.rs

      - name: cargo check (Rhena — compile-level gate)
        working-directory: hildegard
        run: cargo check -p rhena-core
