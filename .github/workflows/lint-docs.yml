name: lint-docs

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/lint-docs.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/lint-docs.yml'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint markdown
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#build" "#docs/archive"

  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.md' --exclude-path docs/archive
          fail: true
