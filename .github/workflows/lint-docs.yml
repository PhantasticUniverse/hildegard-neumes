name: lint-docs

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.yaml'
      - 'lychee.toml'
      - '.github/workflows/lint-docs.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.yaml'
      - 'lychee.toml'
      - '.github/workflows/lint-docs.yml'
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint markdown
        # Uses .markdownlint-cli2.yaml in repo root for config (MD013
        # line-length and related tech-docs-hostile rules disabled there).
        run: markdownlint-cli2

  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Uses lychee.toml in repo root for accept-code config (429 and
          # 503 treated as transient, not broken).
          args: --config lychee.toml --verbose --no-progress './**/*.md'
          fail: true
