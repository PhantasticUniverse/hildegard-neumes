name: validate-contract

on:
  push:
    branches: [main]
    paths:
      - 'src/glyph-names.json'
      - 'src/widths.json'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/validate-contract.yml'
  pull_request:
    paths:
      - 'src/glyph-names.json'
      - 'src/widths.json'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run pytest
        run: pytest -v --deselect tests/test_rhena_smoke.py
