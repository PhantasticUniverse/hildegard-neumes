# lychee config for link checking in lint-docs.yml.
#
# Default lychee accepts the 2xx range. We extend acceptance to include
# transient rate-limit / server-overload codes so CI doesn't fail when
# academic archives and institutional servers are briefly unavailable —
# those links will re-resolve on a retry; they're not broken links.
#
# exclude_path skips historical docs where link rot is expected
# (superseded planning + archived research) and the build output dir.

accept = [200, 201, 202, 203, 204, 205, 206, 207, 208, 226, 429, 500, 503]
timeout = 20
max_retries = 3
retry_wait_time = 2
exclude_path = [
    "docs/archive",
    "build",
]
