# markdownlint-cli2 config for Hildegard Neumes.
#
# This repo is primarily technical documentation — ADRs, design notes,
# planning docs, paleographic research, codegen contracts. Several of
# markdownlint's default rules don't fit that style (they're tuned for
# user-facing prose or blog posts):
#
# Stylistic whitespace rules that make compact ADRs overly noisy:
#   MD012 — multiple consecutive blank lines
#   MD022 — blanks around headings
#   MD031 — blanks around fenced code blocks
#   MD032 — blanks around lists
#
# Content-style rules we don't want to enforce for this corpus:
#   MD013 — line-length (long URLs, wide tables, code samples)
#   MD024 — duplicate headings (ADRs repeat Positive/Negative/Neutral
#           sections; that's the template, not a mistake)
#   MD033 — inline HTML (occasional in tables / figures)
#   MD034 — bare URLs (sometimes the literal URL is the point)
#   MD036 — emphasis-as-heading (prose flourish, not structural)
#   MD040 — language spec on fenced code (would be nice, tedious retrofit)
#   MD041 — first-line-heading (ADRs lead with frontmatter / context)
#   MD060 — table-column-style (cosmetic alignment)
#
# Kept enabled (correctness-oriented, worth enforcing):
#   MD056 — table-column-count (malformed tables are real bugs)
#   and other defaults not mentioned above.

config:
  MD012: false
  MD013: false
  MD022: false
  MD024: false
  MD031: false
  MD032: false
  MD033: false
  MD034: false
  MD036: false
  MD040: false
  MD041: false
  MD060: false

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - "build/**"
  - "docs/archive/**"
